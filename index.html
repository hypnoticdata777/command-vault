<!-- Page Description                                              -->
<!-- ------------------------------------------------------------- -->
<!-- What the user sees:                                           -->
<!-- A terminal-style interface where the user can type commands   -->
<!-- and interact with a quote-based Command Vault experience.     -->
<!-- There is also a quick command area for easier interaction.    -->
<!--                                                               -->
<!-- Structure:                                                    -->
<!-- 1. The <head> contains metadata, title, description, and CSS. -->
<!-- 2. The <body> contains the visible interface.                 -->
<!-- 3. The <main> groups the full terminal experience.            -->
<!-- 4. One <div> displays output, another groups the input line,  -->
<!--    and another holds quick action buttons.                    -->
<!-- 5. The JavaScript file powers the behavior of the interface.  -->
<!-- ============================================================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ── HEAD / PAGE CONFIGURATION ───────────────────────────── -->
  <!-- Contains metadata, page title, SEO description, and CSS.  -->
  <!-- ────────────────────────────────────────────────────────── -->

  <meta charset="UTF-8"> <!-- Allows the page to display special characters correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the layout adapt to phones, tablets, and desktops -->
  <title>Command Vault</title> <!-- Text shown in the browser tab -->
  <meta name="description" content="100 curated quotes of wisdom in English and Spanish, delivered through a terminal-style interface."> <!-- Helps describe the page to search engines and previews -->
  <link rel="stylesheet" href="style.css"> <!-- Connects the external stylesheet without mixing styles into HTML -->
</head>
<body>
  <!-- ── MAIN INTERFACE ──────────────────────────────────────── -->
  <!-- Wraps the full visible experience of the Command Vault.   -->
  <!-- ────────────────────────────────────────────────────────── -->

  <main>
    <!-- Terminal output area -->
    <div
      id="terminal"
      class="terminal"
      role="log"
      aria-live="polite"
      aria-label="Terminal output"
    ></div>

    <!-- ── INPUT ROW ─────────────────────────────────────────── -->
    <!-- Holds the prompt symbol and the command input field.    -->
    <!-- ──────────────────────────────────────────────────────── -->

    <div class="input-row">
      <span class="prompt" aria-hidden="true">&gt;</span> <!-- Decorative prompt symbol, hidden from screen readers -->
      <label for="commandInput" class="sr-only">Enter command</label> <!-- Hidden label improves accessibility for assistive tools -->
      <input
        type="text"
        id="commandInput"
        placeholder="Type a command..."
        autofocus
        aria-label="Command input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
    </div>

    <!-- ── QUICK COMMANDS TOOLBAR ────────────────────────────── -->
    <!-- Area where JavaScript can inject shortcut buttons.      -->
    <!-- ──────────────────────────────────────────────────────── -->

    <div
      id="quickButtons"
      class="quick-buttons"
      role="toolbar"
      aria-label="Quick commands"
    ></div>
  </main>

  <!-- ── SCRIPT CONNECTION ───────────────────────────────────── -->
  <!-- Loads the JavaScript logic as a module for cleaner code.  -->
  <!-- ────────────────────────────────────────────────────────── -->

  <script type="module" src="script.js"></script>
</body>
</html>
