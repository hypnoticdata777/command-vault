<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Vault</title>
  <meta name="description" content="100 curated quotes of wisdom in English and Spanish, delivered through a terminal-style interface.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div
      id="terminal"
      class="terminal"
      role="log"
      aria-live="polite"
      aria-label="Terminal output"
    ></div>
    <div class="input-row">
      <span class="prompt" aria-hidden="true">&gt;</span>
      <label for="commandInput" class="sr-only">Enter command</label>
      <input
        type="text"
        id="commandInput"
        placeholder="Type a command..."
        autofocus
        aria-label="Command input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
    </div>
    <div
      id="quickButtons"
      class="quick-buttons"
      role="toolbar"
      aria-label="Quick commands"
    ></div>
  </main>
  <script type="module" src="script.js"></script>
</body>
</html>
